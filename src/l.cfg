Package lParser;

Helpers

lettre = [['a' .. 'z'] + ['A' .. 'Z']];
chiffre = ['0' .. '9'];
alpha = [lettre + ['_' + '$']];
alphanum = [lettre + chiffre];

Tokens

espaces = (' ' | 13 | 10)+;
commentaire= '#' [[0 .. 0xffff] - [10 + 13]]* (10 | 13 | 10 13);

plus = '+';
moins = '-';
mult = '*';
div = '/';
affect = '=';
inferieur = '<';
ou = '|';
et ='&';
non = '!';
parenthese_ouvrante = '(';
parenthese_fermante = ')';
accolade_ouvrante = '{';
accolade_fermante = '}';
crochet_ouvrant = '[';
crochet_fermant = ']';
point_virgule = ';';
virgule = ',';
vrai = 'true';
faux = 'false';
si = 'si';
sinon = 'sinon';
alors = 'alors';
tantque = 'tantque';
faire = 'faire';
ecrire = 'ecrire';
lire = 'lire';
retour = 'retour';
bool = 'bool';
int = 'int';
nombre = chiffre+;
identifiant = (lettre | '_' | '$') alphanum*;


Ignored Tokens

espaces, commentaire;

Productions

// l'axiome

programme = ldv ldf;

eps = ;

var = {var1} identifiant | {var2} identifiant crochet_ouvrant nombre crochet_fermant;
bloc = {bloc} accolade_ouvrante list_instruction accolade_fermante;
list_instruction = {list_instruction} instruction list_instruction | eps;
declaration = {declaration1} type identifiant | {declaration2} type identifiant crochet_ouvrant nombre crochet_fermant;
type = {entier} int | {bool} bool;

typeopt ={typeopt1} type |{typeopt2} eps;

exp = {ou} exp ou exp1 | {next} exp1;
exp1 = {et} exp1 et exp2 | {next} exp2;
exp2 = {inferieur} exp2 inferieur exp3 | {affect} exp2 affect exp3 | {next} exp3;
exp3 = {plus} exp3 plus exp4 | {moins} exp3 moins exp4 | {next} exp4;
exp4 = {mult} exp4 mult exp5 | {div} exp4 div exp5 | {next} exp5;
exp5 = {non} non exp5 | {next} exp6;
exp6 = {parenthese} parenthese_ouvrante exp parenthese_fermante | {nb} nombre | {vrai} vrai | {faux} faux;

list_expression = {list_expression} exp list_expression1 | eps;
list_expression1 = {list_expression1} virgule exp list_expression1 | eps;

instruction = {affect} var affect exp point_virgule |
    {si} si exp alors bloc | {si1} si exp alors [bc1]: bloc sinon [bc2]: bloc |
    {tantque} tantque exp faire bloc |
    {appel} identifiant parenthese_ouvrante list_expression parenthese_fermante point_virgule|
    {retour} retour exp point_virgule|
    {ecrire} ecrire parenthese_ouvrante exp parenthese_fermante point_virgule;

df = {definition_fonction} typeopt identifiant parenthese_ouvrante [param]: ldv parenthese_fermante [varloc]:ldv bloc;

ldv = {list_variable} declaration ldvp | eps;
ldvp = {list_variable1} virgule declaration ldvp | eps;

ldf = {list_declaration_fonction} df ldfp | eps;
ldfp = {list_declaration_fonction_p} df ldfp | eps;





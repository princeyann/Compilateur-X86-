Package lParser;

Helpers

lettre = [['a' .. 'z'] + ['A' .. 'Z']];
chiffre = ['0' .. '9'];
alpha = [lettre + ['_' + '$']];
alphanum = [lettre + chiffre];

Tokens

espaces = (' ' | 13 | 10)+;
commentaire= '#' [[0 .. 0xffff] - [10 + 13]]* (10 | 13 | 10 13);

plus = '+';
moins = '-';
mult = '*';
div = '/';
affect = '=';
inferieur = '<';
ou = '|';
et ='&';
non = '!';
parenthese_ouvrante = '(';
parenthese_fermante = ')';
accolade_ouvrante = '{';
accolade_fermante = '}';
crochet_ouvrant = '[';
crochet_fermant = ']';
point_virgule = ';';
virgule = ',';
nombre = chiffre+;


Ignored Tokens

espaces, commentaire;

Productions

// l'axiome

programme = exp ;

exp =
     {plus} exp plus nombre |
     {nb} nombre ;


